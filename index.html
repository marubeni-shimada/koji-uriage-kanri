<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>工事管理ダッシュボード（役員用）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--nav:#15233B;--ink:#1A2533;--sub:#64717F;--bg:#EBEFF4;--card:#FFFFFF;--line:#DDE4EC;--line2:#EDF1F5;
  --accent:#3B6FE0;--accent-w:#E7EEFC;--ok:#1C7A56;}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic UI','Yu Gothic','Meiryo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:13px;line-height:1.55}
.num{font-family:'SF Mono','Roboto Mono',ui-monospace,Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
.appbar{background:linear-gradient(180deg,#1B2C49,#15233B);color:#fff;padding:0 22px;display:flex;align-items:center;gap:14px;height:56px}
.logo{width:32px;height:32px;border-radius:8px;background:#3B6FE0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px}
.app-t{font-size:15px;font-weight:800;line-height:1.15}
.app-t small{display:block;font-size:10px;font-weight:600;color:#9DB0CC;letter-spacing:.14em}
.appbar .grow{flex:1}
.appbar .exp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#DCE6F5;font:inherit;font-weight:700;font-size:12px;border-radius:8px;padding:7px 13px;cursor:pointer}
.main{max-width:1240px;margin:0 auto;padding:16px 22px 70px}
.slot{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:12px;transition:.15s}
.imports{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:12px}
.imports .slot{margin-bottom:0}
.slot.hot{border-color:var(--accent);background:var(--accent-w)}
.slot .ic{width:42px;height:42px;border-radius:10px;background:#EEF3FA;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.slot .t{flex:1;min-width:0}
.slot .t b{font-size:14px}
.slot .t .d{font-size:11px;color:var(--sub);margin-top:1px}
.slot label.pick{background:var(--ink);color:#fff;font:inherit;font-weight:800;font-size:13px;border-radius:9px;padding:10px 18px;cursor:pointer;white-space:nowrap}
.slot label.pick input{display:none}
.batchbar{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.batchbar .memo{font-size:11px;font-weight:800;color:var(--sub);background:#F1F5FA;border:1px solid var(--line);border-radius:999px;padding:4px 12px}
.batchbar .memo.on{color:#166B4E;background:#E4F5EC;border-color:#BFE3CD}
.batchbar .spacer{flex:1}
.batchbar .mini{font:inherit;font-size:11px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--sub);border-radius:7px;padding:5px 10px;cursor:pointer}
.batchbar .mini:hover{border-color:var(--accent);color:var(--accent)}
.tabs{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px}
.tabs button{font:inherit;font-weight:700;font-size:12px;border:none;background:transparent;color:var(--sub);padding:9px 18px;cursor:pointer;border-right:1px solid var(--line2)}
.tabs button:last-child{border-right:none}
.tabs button.on{background:var(--accent);color:#fff}
.dashgrid{display:grid;grid-template-columns:300px 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:16px 18px}
.card h3{font-size:12px;font-weight:800;color:var(--sub);margin:0 0 12px;letter-spacing:.04em}
.donutwrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.togg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.togg button{font:inherit;font-size:11px;font-weight:700;border:none;background:#fff;color:var(--sub);padding:5px 12px;cursor:pointer;border-right:1px solid var(--line2)}
.togg button:last-child{border-right:none} .togg button.on{background:var(--accent);color:#fff}
.kpirow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.kpi{background:#F7F9FC;border:1px solid var(--line2);border-radius:11px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.kpi.mid::after{background:var(--sub)} .kpi.up::after{background:var(--ok)}
.kpi .l{font-size:11px;color:var(--sub);font-weight:800}
.kpi .b{font-size:22px;font-weight:800;margin-top:3px} .kpi .b .u{font-size:12px;color:var(--sub)}
.kpi .m{font-size:11px;color:var(--sub)}
.empty{padding:38px 20px;text-align:center;color:var(--sub);font-size:13px}
table{border-collapse:collapse;width:100%;font-size:12px}
thead th{background:#F3F6F9;color:var(--sub);font-weight:800;text-align:left;padding:9px 11px;border-bottom:1.5px solid var(--line);white-space:nowrap;position:sticky;top:0;cursor:pointer}
thead th.r{text-align:right}
tbody td{padding:8px 11px;border-bottom:1px solid var(--line2)}
tbody tr:hover{background:#F7F9FC}
td.r{text-align:right}
.catdot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:middle}
.catbadge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;white-space:nowrap}
.deptbadge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:#EEF2F6;color:var(--sub)}
.pctbar{display:inline-flex;align-items:center;gap:8px;width:100%;justify-content:flex-end}
.pctbar .track{width:90px;height:8px;border-radius:4px;background:#E7ECF1;overflow:hidden;position:relative}
.pctbar .track i{position:absolute;left:0;top:0;bottom:0;border-radius:4px}
.pctbar .v{font-weight:800;min-width:46px;text-align:right}
.nm{font-weight:700} .cust{color:var(--sub);font-size:11px}
.tablecard{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden}
.tablehead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
.tablehead h2{font-size:13px;font-weight:800;margin:0}
.tablehead .right{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--sub)}
.tablehead select{font:inherit;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-weight:700;color:var(--ink)}
.scroll{overflow:auto;max-height:60vh}
@media(max-width:820px){.dashgrid{grid-template-columns:1fr}.kpirow{grid-template-columns:1fr}}
</style>
</head>

</div>

  return `<svg viewBox="0 0 180 180" width="180" height="180"><circle cx="90" cy="90" r="70" fill="none" stroke="#EEF1F5" stroke-width="24"/>${segs}
    <text x="90" y="86" text-anchor="middle" font-size="22" font-weight="800" fill="#1A2533" class="num">${cN}</text>
    <text x="90" y="104" text-anchor="middle" font-size="10" fill="#64717F">${cL}</text></svg>`;}

// ===== 描画 =====
function renderBar(){
  const bb=document.getElementById('batchbar');
  const stat = STATUSMSG ? `<span class="memo${STATUSMSG.indexOf('⚠')>=0?'':' on'}">${STATUSMSG}</span>`
    : CONNECTED ? `<span class="memo on">☁ スプレッドシートに保存中${LASTSAVE?`（最終保存 ${tsText(LASTSAVE)}）`:''}</span>`
    : `<span class="memo">デモ表示</span>`;
  bb.innerHTML=`${stat}<span style="color:var(--sub)">｜ 完成 <b class="num" style="color:var(--ink)">${RAW.completed.length}</b> 件 ／ 未成 <b class="num" style="color:var(--ink)">${RAW.cases.length}</b> 件</span>
    <span class="spacer"></span><button class="mini" id="reloadBtn">↻ 再読込</button><button class="mini" id="clearAll">全消去</button>`;
  document.getElementById('reloadBtn').onclick=()=>init();
  document.getElementById('clearAll').onclick=async()=>{if(confirm('未成・完成のデータをすべて消去しますか？（スプレッドシートも空になります）')){RAW={cases:[],completed:[]};renderBar();render();await gasSave();}};
}
function render(){ assignColors();
  document.getElementById('tabs').innerHTML=[['dash','ダッシュボード'],['done','完成工事'],['open','未成工事']]
    .map(([k,l])=>`<button class="${TAB===k?'on':''}" data-t="${k}">${l}</button>`).join('');
  document.getElementById('view').innerHTML=TAB==='dash'?viewDash():TAB==='done'?viewDone():viewOpen();
  bind();
}
function viewDash(){
  const {arr,tAmt,tN}=catAgg(RAW.completed);
  const openAmt=RAW.cases.reduce((s,r)=>s+(r.amount||0),0);
  const kpis=`<div class="kpirow">
    <div class="kpi up"><div class="l">完成工事（累計）</div><div class="b num">${RAW.completed.length}<span class="u"> 件</span></div><div class="m">請負計 <b class="num">${man(tAmt)}</b> 万円（税抜）</div></div>
    <div class="kpi mid"><div class="l">未成工事（残）</div><div class="b num">${RAW.cases.length}<span class="u"> 件</span></div><div class="m">請負計 <b class="num">${man(openAmt)}</b> 万円（税抜）</div></div>
    <div class="kpi"><div class="l">受注区分</div><div class="b num">${arr.length}<span class="u"> 区分</span></div><div class="m">完成工事の内訳</div></div></div>`;
  if(!RAW.completed.length) return kpis+`<div class="card"><div class="empty">完成の「工事一覧表」を取り込むと、受注区分の割合がここに表示されます。<br>（どっと原価で「完成」を指定して出力 → このファイルを取り込み）</div></div>`;
  const legend=arr.map(o=>`<tr><td><span class="catdot" style="background:${col(o.cat)}"></span><span style="font-weight:700">${o.cat}</span></td>
    <td class="r num">${o.n}</td><td class="r num">${man(o.amt)}</td>
    <td class="r"><span class="pctbar"><span class="track"><i style="width:${((DONUT==='amount'?o.pctAmt:o.pctN)*100).toFixed(0)}%;background:${col(o.cat)}"></i></span><span class="v num">${pct(DONUT==='amount'?o.pctAmt:o.pctN)}</span></span></td></tr>`).join('');
  return kpis+`<div class="dashgrid">
    <div class="card"><h3 style="display:flex;justify-content:space-between;align-items:center">受注区分の割合
      <span class="togg"><button data-donut="amount" class="${DONUT==='amount'?'on':''}">金額</button><button data-donut="count" class="${DONUT==='count'?'on':''}">件数</button></span></h3>
      <div class="donutwrap">${donutSVG(arr,tAmt,tN)}</div></div>
    <div class="card"><h3>受注区分別 内訳（完成工事 累計・税抜）</h3>
      <table><thead><tr><th>受注区分</th><th class="r">件数</th><th class="r">請負(万円)</th><th class="r">割合</th></tr></thead>
      <tbody>${legend}</tbody>
      <tfoot><tr style="border-top:2px solid var(--ink);font-weight:800;background:#F3F6F9"><td style="padding:9px 11px">合計</td><td class="r num" style="padding:9px 11px">${tN}</td><td class="r num" style="padding:9px 11px">${man(tAmt)}</td><td class="r" style="padding:9px 11px">100%</td></tr></tfoot></table></div></div>`;
}
function listTable(list,dateLabel,dateField){
  const cats=['all',...[...new Set(list.map(r=>r.category||'未分類'))].sort()];
  let rows=list.slice(); if(CATFILT!=='all')rows=rows.filter(r=>(r.category||'未分類')===CATFILT);
  rows.sort((a,b)=>{let va=a[sortKey],vb=b[sortKey];if(sortKey==='amount'){va=a.amount||0;vb=b.amount||0;}else{va=String(va||'');vb=String(vb||'');}return va<vb?-1*sortDir:va>vb?1*sortDir:0;});
  const opt=cats.map(c=>`<option value="${c}"${CATFILT===c?' selected':''}>${c==='all'?'すべての区分':c}</option>`).join('');
  const body=rows.map(r=>`<tr>
    <td><span class="catbadge" style="background:${col(r.category)}22;color:${col(r.category)}"><span class="catdot" style="background:${col(r.category)}"></span>${r.category||'未分類'}</span></td>
    <td><div class="nm">${r.name}</div><div class="cust">${r.customer}</div></td>
    <td><span class="deptbadge">${r.dept||''}</span></td><td>${r.person||''}</td>
    <td class="num" style="color:var(--sub)">${r[dateField]||''}</td>
    <td class="r num">${man(r.amount)}</td></tr>`).join('');
  const tot=rows.reduce((s,r)=>s+(r.amount||0),0);
  return {opt,cats,rows,body,tot,head:`<tr><th data-k="category">受注区分</th><th data-k="name">工事名／得意先</th><th data-k="dept">部門</th><th data-k="person">担当</th><th data-k="${dateField}">${dateLabel}</th><th class="r" data-k="amount">請負(税抜)</th></tr>`};
}
function viewDone(){ const t=listTable(RAW.completed,'完成/工期末','done');
  return `<div class="tablecard"><div class="tablehead"><h2>完成工事（受注区分で自動振り分け・累計）</h2>
    <div class="right"><select class="filt" id="catfilt">${t.opt}</select><span>${t.rows.length}件</span></div></div>
    <div class="scroll"><table><thead>${t.head}</thead><tbody>${t.body||'<tr><td colspan=6 class=empty>まだありません</td></tr>'}</tbody>
    <tfoot><tr style="border-top:2px solid var(--ink);font-weight:800;background:#F3F6F9"><td colspan="5" style="padding:10px 11px">合計 ${t.rows.length}件</td><td class="r num" style="padding:10px 11px">${man(t.tot)}</td></tr></tfoot></table></div></div>`;
}
function viewOpen(){ const t=listTable(RAW.cases,'工期末','pend');
  return `<div class="tablecard"><div class="tablehead"><h2>未成工事（積み上げ・完成分は自動で除外）</h2>
    <div class="right"><select class="filt" id="catfilt">${t.opt}</select><span>${t.rows.length}件</span></div></div>
    <div class="scroll"><table><thead>${t.head}</thead><tbody>${t.body||'<tr><td colspan=6 class=empty>まだありません</td></tr>'}</tbody>
    <tfoot><tr style="border-top:2px solid var(--ink);font-weight:800;background:#F3F6F9"><td colspan="5" style="padding:10px 11px">合計 ${t.rows.length}件</td><td class="r num" style="padding:10px 11px">${man(t.tot)}</td></tr></tfoot></table></div></div>`;
}
function bind(){document.querySelectorAll('[data-donut]').forEach(b=>b.onclick=()=>{DONUT=b.dataset.donut;render();});
  const cf=document.getElementById('catfilt');if(cf)cf.onchange=()=>{CATFILT=cf.value;render();};
  document.querySelectorAll('thead th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='amount')?-1:1;}render();});}
document.getElementById('tabs').addEventListener('click',e=>{const b=e.target.closest('button');if(b){TAB=b.dataset.t;CATFILT='all';render();}});

// ===== 工事一覧表パーサ（2行1レコード・未成/完成 自動判定）=====
function fixRange(sh){ let maxR=0,maxC=0;
  Object.keys(sh).forEach(k=>{ if(k[0]==='!')return; const m=k.match(/^([A-Z]+)(\d+)$/); if(!m)return;
    maxR=Math.max(maxR,+m[2]); maxC=Math.max(maxC,XLSX.utils.decode_col(m[1])); });
  if(maxR) sh['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:maxR-1,c:maxC}}); }
function parseKoujiList(wb){
  const sh=wb.Sheets[wb.SheetNames[0]]; fixRange(sh); // 壊れた範囲(!ref)を実セルから復元
  const A=XLSX.utils.sheet_to_json(sh,{header:1,raw:true});
  let type='open';
  for(let i=0;i<Math.min(A.length,10);i++){ const line=(A[i]||[]).map(x=>String(x||'')).join('');
    if(line.includes('未成・完成')){ type=line.includes('完成:完成')?'done':'open'; break; } }
  const recs=[];
  for(let r=0;r<A.length;r++){ const row=A[r]||[];
    let ci=-1; for(let j=0;j<row.length;j++){ if(row[j]&&/^\d{4,}-/.test(String(row[j]))){ci=j;break;} }
    if(ci>=0){ const b=A[r+1]||[];
      recs.push({code:String(row[ci]).trim(),
        customer:String(row[ci+1]||'').replace(/\u3000/g,' ').trim(),
        name:String(b[ci+1]||'').replace(/\u3000/g,' ').trim(),
        dept:String(row[ci+2]||'').trim(),
        category:String(b[ci+2]||'').replace(/\u3000/g,' ').trim()||'未分類',
        person:String(row[ci+3]||'').replace(/\u3000/g,' ').trim(),
        pstart:toISO(row[ci+4]),pend:toISO(row[ci+6]),done:toISO(b[ci+6]),
        amount:Number(row[ci+7])||0});
      r++; } }
  return {type,records:recs};
}
function mergeByCode(target,recs){const have=new Set(target.map(x=>String(x.code)));let add=0,skip=0;
  recs.forEach(r=>{if(have.has(String(r.code))){skip++;}else{have.add(String(r.code));target.push(r);add++;}});return {add,skip};}

function doImport(file, expected){
  file.arrayBuffer().then(async b=>{try{
    const {type,records}=parseKoujiList(XLSX.read(b,{type:'array'}));
    if(!records.length){alert('工事一覧表として認識できませんでした。どっと原価の「工事一覧表」出力かご確認ください。');return;}
    if(type!==expected){
      const ft=type==='done'?'完成':'未成', st=expected==='done'?'完成':'未成';
      if(!confirm(`このファイルは【${ft}】のデータのようです。\n（${st}の取込口に入れられました）\n\n中身に合わせて【${ft}】として取り込みます。よろしいですか？`)) return;
    }
    let msg;
    if(type==='done'){ const {add,skip}=mergeByCode(RAW.completed,records); const moved=reconcile();
      msg=`【完成】として取込\n新規追加：${add}件${skip?`\n重複スキップ：${skip}件`:''}${moved?`\n未成から移動：${moved}件`:''}\n完成累計：${RAW.completed.length}件`; }
    else{ const {add,skip}=mergeByCode(RAW.cases,records); reconcile();
      msg=`【未成】として取込\n新規追加：${add}件${skip?`\n重複スキップ：${skip}件`:''}\n未成累計：${RAW.cases.length}件`; }
    CATFILT='all';renderBar();render();await gasSave();
    alert(msg+(CONNECTED?'\n（スプレッドシートに保存しました）':'\n（未接続：保存されていません）'));
  }catch(err){alert('読み込み失敗：'+err.message);}});
}
[['file1','slot1','open'],['file2','slot2','done']].forEach(([fid,sid,exp])=>{
  document.getElementById(fid).addEventListener('change',e=>{const f=e.target.files[0];if(f){doImport(f,exp);e.target.value='';}});
  const slot=document.getElementById(sid);
  ['dragenter','dragover'].forEach(ev=>slot.addEventListener(ev,e=>{e.preventDefault();slot.classList.add('hot');}));
  ['dragleave','drop'].forEach(ev=>slot.addEventListener(ev,e=>{e.preventDefault();slot.classList.remove('hot');}));
  slot.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)doImport(f,exp);});
});

document.getElementById('dl').addEventListener('click',()=>{const wb=XLSX.utils.book_new();
  const H=['受注区分','コード','得意先','工事名','部門','担当','工期開始','工期末','完成日','請負(税抜円)'];
  const line=r=>[r.category,r.code,r.customer,r.name,r.dept,r.person,r.pstart||'',r.pend||'',r.done||'',Math.round(r.amount||0)];
  const mk=(name,arr)=>{const ws=XLSX.utils.aoa_to_sheet([H,...arr.map(line)]);ws['!cols']=[{wch:16},{wch:11},{wch:22},{wch:34},{wch:8},{wch:10},{wch:11},{wch:11},{wch:11},{wch:14}];XLSX.utils.book_append_sheet(wb,ws,name);};
  mk('完成工事',RAW.completed);mk('未成工事',RAW.cases);
  const {arr}=catAgg(RAW.completed);
  const cws=XLSX.utils.aoa_to_sheet([['受注区分','件数','請負(万円)','割合'],...arr.map(o=>[o.cat,o.n,Math.round(o.amt/10000),Number(o.pctAmt.toFixed(4))])]);
  XLSX.utils.book_append_sheet(wb,cws,'受注区分サマリー');
  XLSX.writeFile(wb,'工事管理_ダッシュボード.xlsx');});

init();
</script>
