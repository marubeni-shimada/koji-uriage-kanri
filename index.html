<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>工事管理ダッシュボード（役員用）</title>

<style>
:root{--nav:#15233B;--ink:#1A2533;--sub:#64717F;--bg:#EBEFF4;--card:#FFFFFF;--line:#DDE4EC;--line2:#EDF1F5;
  --accent:#3B6FE0;--accent-w:#E7EEFC;--ok:#1C7A56;--mid:#B0851A;--low:#C2683A;--neg:#C0392B;
  --c1:#2F6FE0;--c2:#1D9E8B;--c3:#E09A24;--c4:#D9603A;--c5:#8B97A4;}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic UI','Yu Gothic','Meiryo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:13px;line-height:1.55}
.num{font-family:'SF Mono','Roboto Mono',ui-monospace,Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
.appbar{background:linear-gradient(180deg,#1B2C49,#15233B);color:#fff;padding:0 22px;display:flex;align-items:center;gap:14px;height:56px}
.logo{width:32px;height:32px;border-radius:8px;background:#3B6FE0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px}
.app-t{font-size:15px;font-weight:800;line-height:1.15}
.app-t small{display:block;font-size:10px;font-weight:600;color:#9DB0CC;letter-spacing:.14em}
.appbar .grow{flex:1}
.appbar .exp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#DCE6F5;font:inherit;font-weight:700;font-size:12px;border-radius:8px;padding:7px 13px;cursor:pointer}
.main{max-width:1240px;margin:0 auto;padding:16px 22px 70px}
.imports{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:12px}
.slot{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;transition:.15s}
.slot.hot{border-color:var(--accent);background:var(--accent-w)}
.slot .ic{width:38px;height:38px;border-radius:9px;background:#EEF3FA;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.slot .t{flex:1;min-width:0}
.slot .t b{font-size:13px} .slot .t .tag{font-size:9px;font-weight:800;color:#1D9E8B;background:#E1F5EF;border-radius:4px;padding:1px 5px;margin-left:6px}
.slot .t .st{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:5px}
.slot .t .st .led{width:7px;height:7px;border-radius:50%;background:#C7CFD8} .slot .t .st .led.on{background:#23A06B}
.slot label.pick{background:var(--ink);color:#fff;font:inherit;font-weight:700;font-size:12px;border-radius:8px;padding:8px 13px;cursor:pointer;white-space:nowrap}
.slot label.pick input{display:none}
.batchbar{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.batchbar .lab{font-size:11px;font-weight:800;color:var(--sub)}
.batchbar .memo{font-size:11px;font-weight:800;color:var(--sub);background:#F1F5FA;border:1px solid var(--line);border-radius:999px;padding:4px 12px}
.batchbar .memo.on{color:#166B4E;background:#E4F5EC;border-color:#BFE3CD}
.chip{display:inline-flex;align-items:center;gap:6px;background:#F1F5FA;border:1px solid var(--line);border-radius:999px;padding:3px 6px 3px 10px;font-size:11px;font-weight:700}
.chip .n{color:var(--sub);font-weight:600}
.chip .x{cursor:pointer;color:var(--sub);background:#E4EAF0;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:11px;line-height:1}
.chip .x:hover{background:#E24B4A;color:#fff}
.batchbar .spacer{flex:1}
.batchbar .mini{font:inherit;font-size:11px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--sub);border-radius:7px;padding:5px 10px;cursor:pointer}
.batchbar .mini:hover{border-color:var(--accent);color:var(--accent)}
.tabs{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px;flex-wrap:wrap}
.tabs button{font:inherit;font-weight:700;font-size:12px;border:none;background:transparent;color:var(--sub);padding:9px 16px;cursor:pointer;border-right:1px solid var(--line2)}
.tabs button:last-child{border-right:none}
.tabs button.on{background:var(--accent);color:#fff}
.dashgrid{display:grid;grid-template-columns:300px 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:16px 18px}
.card h3{font-size:12px;font-weight:800;color:var(--sub);margin:0 0 12px;letter-spacing:.04em}
.donutwrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.togg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.togg button{font:inherit;font-size:11px;font-weight:700;border:none;background:#fff;color:var(--sub);padding:5px 12px;cursor:pointer;border-right:1px solid var(--line2)}
.togg button:last-child{border-right:none} .togg button.on{background:var(--accent);color:#fff}
.kpirow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.kpi{background:#F7F9FC;border:1px solid var(--line2);border-radius:11px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.kpi.mid::after{background:var(--sub)} .kpi.up::after{background:var(--ok)}
.kpi .l{font-size:11px;color:var(--sub);font-weight:800}
.kpi .b{font-size:22px;font-weight:800;margin-top:3px} .kpi .b .u{font-size:12px;color:var(--sub)}
.kpi .m{font-size:11px;color:var(--sub)}
.monthbars{display:flex;align-items:flex-end;gap:6px;height:70px;padding-top:8px}
.monthbars .mb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:flex-end}
.monthbars .mb .bar{width:100%;max-width:26px;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px}
.monthbars .mb .lb{font-size:9px;color:var(--sub)}
table{border-collapse:collapse;width:100%;font-size:12px}
thead th{background:#F3F6F9;color:var(--sub);font-weight:800;text-align:left;padding:9px 11px;border-bottom:1.5px solid var(--line);white-space:nowrap;position:sticky;top:0;cursor:pointer}
thead th.r{text-align:right}
tbody td{padding:8px 11px;border-bottom:1px solid var(--line2)}
tbody tr:hover{background:#F7F9FC}
td.r{text-align:right}
.catdot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:middle}
.catbadge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;white-space:nowrap}
.pctbar{display:inline-flex;align-items:center;gap:8px;width:100%;justify-content:flex-end}
.pctbar .track{width:90px;height:8px;border-radius:4px;background:#E7ECF1;overflow:hidden;position:relative}
.pctbar .track i{position:absolute;left:0;top:0;bottom:0;border-radius:4px}
.pctbar .v{font-weight:800;min-width:46px;text-align:right}
.nm{font-weight:700} .cust{color:var(--sub);font-size:11px}
.mz{display:inline-flex;align-items:center;gap:8px;justify-content:flex-end}
.mbar{width:44px;height:7px;border-radius:4px;background:#E7ECF1;overflow:hidden;position:relative}
.mbar i{position:absolute;left:0;top:0;bottom:0;border-radius:4px}
.hi i{background:var(--ok)} .midb i{background:var(--mid)} .low i{background:var(--low)} .neg i{background:var(--neg)}
.mval{font-weight:800;min-width:48px;text-align:right}
.hi .mval{color:var(--ok)} .midb .mval{color:var(--mid)} .low .mval{color:var(--low)} .neg .mval{color:var(--neg)}

.tablecard{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden}
.tablehead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
.tablehead h2{font-size:13px;font-weight:800;margin:0}
.tablehead .right{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--sub)}
.tablehead select,.filt{font:inherit;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-weight:700;color:var(--ink)}
.scroll{overflow:auto;max-height:58vh}
.ohbox{display:flex;align-items:center;gap:6px}.ohbox input{width:40px;border:1px solid var(--line);border-radius:6px;font:inherit;padding:3px 5px;text-align:right}
.rank{display:inline-flex;align-items:center;justify-content:center;width:23px;height:23px;border-radius:50%;font-weight:800;font-size:12px;background:#EEF2F6;color:var(--sub)}
.rank.r1{background:#FBEFCB;color:#9A7400}.rank.r2{background:#E9EDF1;color:#5A6675}.rank.r3{background:#F3E3D6;color:#955A33}
@media(max-width:820px){.dashgrid{grid-template-columns:1fr}.imports{grid-template-columns:1fr}.kpirow{grid-template-columns:1fr}}
</style>
</head>

function viewDone(){let rows=completedRows();if(CATFILT!=='all')rows=rows.filter(r=>r.category===CATFILT);
  rows.sort((a,b)=>{let va=a[sortKey]??-9,vb=b[sortKey]??-9;if(sortKey==='name'||sortKey==='category'||sortKey==='month'){va=a[sortKey]||'';vb=b[sortKey]||'';}return va<vb?-1*sortDir:va>vb?1*sortDir:0;});
  const opt=['all',...CATS].map(c=>`<option value="${c}"${CATFILT===c?' selected':''}>${c==='all'?'すべての区分':c}</option>`).join('');
  const body=rows.map(r=>{const bc=band(r.margin),bw=Math.max(0,Math.min(100,((r.margin||0)/0.30)*100));
    return `<tr><td><span class="catbadge" style="background:${CATHEX[r.category]}22;color:${CATHEX[r.category]}"><span class="catdot" style="background:${CATHEX[r.category]}"></span>${r.category}</span></td>
      <td><div class="nm">${r.name}</div><div class="cust">${r.customer}</div></td><td>${r.person}</td>
      <td class="num" style="color:var(--sub)">${r.done||''}</td><td class="r num">${yen(r.revenue)}</td>
      <td class="r"><span class="mz ${bc}"><span class="mbar"><i style="width:${bw}%"></i></span><span class="mval num">${pct(r.margin)}</span></span></td></tr>`;}).join('');
  const to=rows.reduce((s,r)=>s+r.revenue,0),tp=rows.reduce((s,r)=>s+r.profit,0);
  return `<div class="tablecard"><div class="tablehead"><h2>完成工事（受注区分で自動振り分け・累計）</h2>
    <div class="right"><select class="filt" id="catfilt">${opt}</select><span>${rows.length}件</span></div></div>
    <div class="scroll"><table><thead><tr><th data-k="category">受注区分</th><th data-k="name">工事名／得意先</th><th data-k="person">担当</th><th data-k="month">完成</th><th class="r" data-k="revenue">完成工事高</th><th class="r" data-k="margin">粗利率</th></tr></thead>
      <tbody>${body}</tbody>
      <tfoot><tr style="border-top:2px solid var(--ink);font-weight:800;background:#F3F6F9"><td colspan="4" style="padding:10px 11px">合計 ${rows.length}件</td><td class="r num" style="padding:10px 11px">${yen(to)}</td><td class="r num" style="padding:10px 11px">${to?pct(tp/to):'—'}</td></tr></tfoot></table></div></div>`;
}
function viewOpen(){const {promoted,remaining}=matchState();
  const body=remaining.map(c=>{const mg=caseMargin(c),bc=band(mg),bw=Math.max(0,Math.min(100,((mg||0)/0.30)*100));
    return `<tr><td><span class="catbadge" style="background:#EEF2F6;color:var(--sub)">${c.section}</span></td>
      <td><div class="nm">${c.name}</div><div class="cust">${c.customer}</div></td><td>${c.person||''}</td>
      <td class="num" style="color:var(--sub)">${c.pend||''}</td><td class="r num">${yen(c.order)}</td>
      <td class="r"><span class="mz ${bc}"><span class="mbar"><i style="width:${bw}%"></i></span><span class="mval num">${pct(mg)}</span></span></td></tr>`;}).join('');
  return `<div class="banner">✔ 完成工事一覧に載っていた <b>${promoted.length}件</b> を未成から繰り上げ（除外）。残りの未成工事は <b>${remaining.length}件</b> です。</div>
  <div class="tablecard"><div class="tablehead"><h2>未成工事（一覧に残す）</h2>
    <div class="right"><span class="ohbox">粗利率加算 <input type="number" id="overhead" value="13" step="1" min="0">%</span><span>${remaining.length}件</span></div></div>
    <div class="scroll"><table><thead><tr><th>区分</th><th>工事名／得意先</th><th>担当</th><th>工期末</th><th class="r">受注額</th><th class="r">粗利率</th></tr></thead><tbody>${body}</tbody></table></div></div>`;
}
function viewPerson(){const arr=personAgg();const maxM=Math.max(...arr.map(a=>a.margin||0),0.30);
  const body=arr.map((a,i)=>{const bc=band(a.margin),bw=Math.max(0,Math.min(100,((a.margin||0)/maxM)*100));const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    return `<tr><td><span class="rank ${rc}">${i+1}</span></td><td style="font-weight:800">${a.person}</td><td class="r num">${a.n}</td><td class="r num">${yen(a.rev)}</td><td class="r num">${yen(a.profit)}</td>
      <td class="r"><span class="mz ${bc}"><span class="mbar" style="width:120px"><i style="width:${bw}%"></i></span><span class="mval num">${pct(a.margin)}</span></span></td></tr>`;}).join('');
  const tr=arr.reduce((s,a)=>s+a.rev,0),tp=arr.reduce((s,a)=>s+a.profit,0),tn=arr.reduce((s,a)=>s+a.n,0);
  return `<div class="tablecard"><div class="tablehead"><h2>担当者別 粗利率（完成実績 累計）</h2><div class="right"><span>${arr.length}名</span></div></div>
    <div class="scroll"><table><thead><tr><th style="width:50px">順位</th><th>担当者（現場代理人）</th><th class="r">件数</th><th class="r">売上計</th><th class="r">粗利計</th><th class="r" style="width:200px">粗利率</th></tr></thead>
    <tbody>${body}</tbody><tfoot><tr style="border-top:2px solid var(--ink);font-weight:800;background:#F3F6F9"><td></td><td style="padding:10px 11px">全社 平均</td><td class="r num">${tn}</td><td class="r num">${yen(tr)}</td><td class="r num">${yen(tp)}</td><td class="r num">${tr?pct(tp/tr):'—'}</td></tr></tfoot></table></div></div>`;
}
function bind(){document.querySelectorAll('[data-donut]').forEach(b=>b.onclick=()=>{DONUT=b.dataset.donut;render();});
  const cf=document.getElementById('catfilt');if(cf)cf.onchange=()=>{CATFILT=cf.value;render();};
  const o=document.getElementById('overhead');if(o)o.oninput=()=>render();
  document.querySelectorAll('thead th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='revenue'||k==='margin')?-1:1;}render();});}
document.getElementById('tabs').addEventListener('click',e=>{const b=e.target.closest('button');if(b){TAB=b.dataset.t;render();}});

function parseCases(wb){const nm0=wb.SheetNames.find(n=>n.replace(/\s/g,'')==='手持ち工事量')||wb.SheetNames.find(n=>n.includes('手持'))||wb.SheetNames[0];
  const ws=wb.Sheets[nm0];const A=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
  const sm={'①':'①商社工事','②':'②土木官庁','③':'③土木下請','⑤':'⑤優先(繰越)','⑥':'⑥見込み'};let sec=null;const cases=[];
  A.forEach(row=>{const a=row[0];if(typeof a==='string'){for(const k in sm)if(a.startsWith(k))sec=sm[k];}
    const cust=row[1],name=row[2];if(sec&&cust&&name&&name!=='物件名'&&!String(cust).startsWith('計')){cases.push({section:sec,code:typeof a==='string'&&/^\d/.test(a)?a.trim():'',
      customer:String(cust).replace(/\u3000/g,' '),name:String(name).replace(/\u3000/g,' '),person:row[4]?String(row[4]).replace(/\u3000/g,' '):'',
      pstart:toISO(row[5]),pend:toISO(row[7])||toISO(row[6]),order:Number(row[8])||0,baseRate:(row[11]==null||row[11]==='')?null:Number(row[11]),marginCached:(row[9]==null||row[9]==='')?null:Number(row[9])});}});
  return cases;}
function parseCompleted(wb){const tg=wb.SheetNames.filter(n=>/完成/.test(n)&&(n.includes('土木')||n.includes('営業'))&&!n.includes('原価管理')&&!n.includes('全体'));
  const list=tg.length?tg:wb.SheetNames;const out=[];const seen=new Set();
  list.forEach(nm=>{const ws=wb.Sheets[nm];const A=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});let hr=-1,H={};
    for(let i=0;i<Math.min(A.length,10);i++){const row=(A[i]||[]).map(x=>String(x||''));if(row.some(c=>c.includes('完成工事高'))){hr=i;row.forEach((c,j)=>{if(c)H[c]=j});break;}}
    if(hr<0)return;const col=(...ns)=>{for(const n of ns)for(const k in H)if(k.includes(n))return H[k];return -1;};
    const ci={cust:col('得意先'),name:col('工事名'),cat:col('受注区分'),person:col('現場代理人'),done:col('完成年月'),rev:col('完成工事高'),profit:col('実質利益')};
    if(ci.rev<0||ci.name<0)return;
    for(let i=hr+1;i<A.length;i++){const row=A[i]||[];const rev=Number(row[ci.rev]);const name=row[ci.name];
      if(!name||!rev||isNaN(rev))continue;if(String(name).includes('工事名'))continue;const key=String(row[ci.cust])+'|'+name;if(seen.has(key))continue;seen.add(key);
      out.push({customer:String(row[ci.cust]||'').replace(/\u3000/g,' '),name:String(name).replace(/\u3000/g,' '),
        category:ci.cat>=0?String(row[ci.cat]||'').replace(/\u3000/g,' '):'',person:ci.person>=0?String(row[ci.person]||'').replace(/\u3000/g,' '):'',
        done:toISO(row[ci.done]),revenue:Number(row[ci.rev])||0,profit:Number(row[ci.profit])||0});}});
  return out;}

function mergeCompleted(rows){const have=new Set(RAW.completed.map(keyf));let add=0,skip=0;
  rows.forEach(r=>{const k=keyf(r);if(have.has(k)){skip++;}else{have.add(k);RAW.completed.push(r);add++;}});return {add,skip};}

document.getElementById('file1').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;
  f.arrayBuffer().then(async b=>{try{const c=parseCases(XLSX.read(b,{type:'array'}));if(!c.length){alert('工事一覧表（未成）を認識できませんでした。');return;}
    RAW.cases=c;renderSlots();render();await gasSave();
    alert('工事一覧表（未成）を取り込みました：'+c.length+'件'+(CONNECTED?'\n（スプレッドシートに保存しました）':'\n（デモ表示：未接続のため保存はされません）'));}catch(err){alert('読み込み失敗：'+err.message);}});});
document.getElementById('file2').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;
  f.arrayBuffer().then(async b=>{try{const c=parseCompleted(XLSX.read(b,{type:'array'}));if(!c.length){alert('完成工事一覧を認識できませんでした。');return;}
    const {add,skip}=mergeCompleted(c);renderSlots();render();await gasSave();
    alert(`完成工事を積み上げました。\n新規追加：${add}件${skip?`\n重複でスキップ：${skip}件`:''}\n累計：${RAW.completed.length}件`+(CONNECTED?'\n（スプレッドシートに保存しました）':'\n（デモ表示：未接続のため保存はされません）'));}catch(err){alert('読み込み失敗：'+err.message);}});});
[['slot1','file1'],['slot2','file2']].forEach(([id,fid])=>{const el=document.getElementById(id);
  ['dragenter','dragover'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();el.classList.add('hot');}));
  ['dragleave','drop'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();el.classList.remove('hot');}));
  el.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f){const inp=document.getElementById(fid);const dt=new DataTransfer();dt.items.add(f);inp.files=dt.files;inp.dispatchEvent(new Event('change'));}});});

document.getElementById('dl').addEventListener('click',()=>{const wb=XLSX.utils.book_new();
  const done=completedRows();const {remaining}=matchState();const {arr}=catAgg();
  const dws=XLSX.utils.aoa_to_sheet([['受注区分','得意先','工事名','担当','完成','完成工事高(万円)','粗利率'],...done.map(r=>[r.category,r.customer,r.name,r.person,r.done||'',Math.round(r.revenue),r.margin!=null?Number(r.margin.toFixed(4)):''])]);
  dws['!cols']=[{wch:14},{wch:22},{wch:34},{wch:10},{wch:11},{wch:13},{wch:8}];XLSX.utils.book_append_sheet(wb,dws,'完成工事(累計)');
  const ows=XLSX.utils.aoa_to_sheet([['区分','得意先','工事名','担当','工期末','受注額(万円)','粗利率'],...remaining.map(c=>[c.section,c.customer,c.name,c.person||'',c.pend||'',Math.round(c.order||0),caseMargin(c)!=null?Number(caseMargin(c).toFixed(4)):''])]);
  XLSX.utils.book_append_sheet(wb,ows,'未成工事');
  const cws=XLSX.utils.aoa_to_sheet([['受注区分','件数','売上(万円)','粗利率','割合(売上)'],...arr.map(o=>[o.cat,o.n,Math.round(o.rev),o.margin!=null?Number(o.margin.toFixed(4)):'',Number(o.pctRev.toFixed(4))])]);
  XLSX.utils.book_append_sheet(wb,cws,'受注区分サマリー');
  XLSX.writeFile(wb,'工事管理_ダッシュボード.xlsx');});

init();
</script>
</body>
